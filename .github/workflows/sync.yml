name: Sync to Hugging Face Hub
on:
  push:
    branches: [main] 
  workflow_dispatch:
jobs:
 sync:    
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
       fetch-depth: 0
    - name: Push to Hub
      env:
       HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: git push --force https://Kekemelmohatle:$HF_TOKEN@huggingface.co/spaces/Kekemelmohatle/PAHub main
